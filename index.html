<!-- This is a local-only app. All data lives in this browser; use Settings → Backup & restore to move data between devices. -->
<script>
  // Service worker registration. Skipped on file:// so local-file dev still works.
  if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' }).then((reg) => {
        // When a new worker is installed and waiting, auto-activate it.
        // sw.js calls skipWaiting() on install and clients.claim() on activate,
        // so this controllerchange will fire and trigger reload below.
        const activateWaiting = () => {
          if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        };
        if (reg.waiting) activateWaiting();
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) activateWaiting();
          });
        });

        // Poll for new versions: every 60s while the page is open, and
        // immediately when the tab regains focus / becomes visible. Without
        // this, the browser only checks for updates on initial load — which
        // is why deploys felt "stuck" until a manual hard refresh.
        const poll = () => { try { reg.update(); } catch (_) {} };
        setInterval(poll, 60_000);
        document.addEventListener('visibilitychange', () => { if (!document.hidden) poll(); });
        window.addEventListener('focus', poll);
      }).catch((err) => console.warn('SW registration failed:', err));

      let reloaded = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (reloaded) return;
        reloaded = true;
        location.reload();
      });
    });
  }
</script>
<script>
/* =========================================================================
   PMP PREP APP — single-file vanilla JS
   ========================================================================= */

/* ---------------- Utilities ---------------- */
const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
const html = (strings, ...values) => strings.reduce((acc,s,i)=>acc+s+(values[i]??''),'');
const escapeHtml = (s='') => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
// Detect explanations truncated mid-sentence in the source PDF (~40/1044 affected).
// Heuristic: text doesn't end with terminal punctuation AND ends with a comma or connector word.
const isExplanationTruncated = (s='') => {
  const t = String(s).trim();
  if (!t) return false;
  if (/[.!?:")\]]$/.test(t)) return false;
  if (/,$/.test(t)) return true;
  return /\b(the|a|an|of|to|in|on|by|for|with|and|or|is|be|as|at|from|that|this|which|its|their|his|her|our|your|my|are|was|were|will|would|should|could|can|may|might)$/i.test(t);
};
const truncatedExplBadge = '<span class="text-[10px] px-1.5 py-0.5 rounded bg-amber-100 dark:bg-amber-900/40 text-amber-800 dark:text-amber-300" title="The source PDF cuts off this explanation mid-sentence. We are not fabricating the missing text.">⚠ truncated in source</span>';
const fmtTime = (sec) => {
  sec = Math.max(0, Math.round(sec));
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  return (h?String(h).padStart(2,'0')+':':'') + String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
};
const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36);
const shuffle = (arr) => { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };
const debounce = (fn,ms=200)=>{let t;return (...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};};

function toast(msg, kind='info') {
  const el = document.createElement('div');
  const colors = { info:'bg-slate-900 text-white', success:'bg-emerald-600 text-white', error:'bg-rose-600 text-white', warn:'bg-amber-500 text-white' };
  el.className = `${colors[kind]} px-4 py-2 rounded-lg shadow-soft text-sm fade-in`;
  el.textContent = msg;
  $('#toast').appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 2400);
}

/* ---------------- Storage ---------------- */
const KEY = 'pmpprep.v1';
// Keep this string in lock-step with sw.js CACHE_VERSION so the footer
// reflects the actually-deployed build the user is looking at.
const APP_VERSION = 'v2026.04.25.14';

// IndexedDB layer — survives iOS Safari's aggressive localStorage eviction (ITP,
// "Clear History and Website Data", tab-close in some private-mode states).
// We write-through on every save and check for a fresher copy on boot.
const IDB = (() => {
  const DB = 'pmpprep'; const STORE = 'state'; const ROW = 'main';
  function open() {
    return new Promise((resolve, reject) => {
      try {
        const req = indexedDB.open(DB, 1);
        req.onupgradeneeded = () => req.result.createObjectStore(STORE);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      } catch (e) { reject(e); }
    });
  }
  return {
    async get() {
      try {
        const db = await open();
        return await new Promise((res, rej) => {
          const tx = db.transaction(STORE, 'readonly');
          const r = tx.objectStore(STORE).get(ROW);
          r.onsuccess = () => res(r.result || null);
          r.onerror = () => rej(r.error);
        });
      } catch { return null; }
    },
    async put(value) {
      try {
        const db = await open();
        await new Promise((res, rej) => {
          const tx = db.transaction(STORE, 'readwrite');
          tx.objectStore(STORE).put(value, ROW);
          tx.oncomplete = () => res();
          tx.onerror = () => rej(tx.error);
        });
      } catch {}
    },
  };
})();

const Store = {
  load() {
    try {
      const s = JSON.parse(localStorage.getItem(KEY)) || this._default();
      return Object.assign(this._default(), s);
    } catch { return this._default(); }
  },
  save(state) {
    try { localStorage.setItem(KEY, JSON.stringify(state)); } catch {}
    // Write-through to IDB; fire-and-forget.
    IDB.put(state);
  },
  _default() {
    return {
      attempts: [],          // completed attempts
      currentAttempt: null,  // in-progress attempt (auto-resumed)
      mastery: {},           // qid -> { correct, wrong, lastSeen, ef, interval, due }
      flags: {},             // qid -> true
      qNotes: {},            // qid -> free-text note
      libNotes: {},          // sectionKey -> note
      bookmarks: {},         // sectionKey -> true
      readPos: {},           // bookId -> chapterId-sectionId (last read)
      flashState: {},        // cardId -> { ef, interval, due, reps }
      studyDays: {},         // 'YYYY-MM-DD' -> { qs:n, mins:n }
      courseProgress: {},    // courseId -> { chapterId: timestamp }
      settings: { theme: 'system', sound: false, confidenceCapture: false, tourSeen: false, dashboardMode: 'all' },
      lastModified: 0        // ms since epoch — bumped on every save
    };
  }
};
let STATE = Store.load();

// On boot, async-check IndexedDB for a fresher copy. This recovers the case
// where iOS Safari wiped localStorage but IDB survived.
(async () => {
  try {
    const idbState = await IDB.get();
    if (!idbState) {
      // First boot, or IDB has nothing yet — seed it with whatever localStorage has.
      if (STATE.lastModified) IDB.put(STATE);
      return;
    }
    const idbMod = idbState.lastModified || 0;
    const lsMod = STATE.lastModified || 0;
    if (idbMod > lsMod) {
      // IDB is newer (localStorage was likely evicted) — restore.
      STATE = Object.assign(Store._default(), idbState);
      try { localStorage.setItem(KEY, JSON.stringify(STATE)); } catch {}
      if (typeof rebuildCatalog === 'function') rebuildCatalog();
      if (typeof applyTheme === 'function') applyTheme();
      if (typeof render === 'function') render();
      if (lsMod === 0 && idbMod > 0) {
        // localStorage was wiped — surface this so user knows the recovery happened.
        try { toast('Restored your progress from local backup', 'success'); } catch {}
      }
    } else if (lsMod > idbMod) {
      // localStorage is newer — push to IDB.
      IDB.put(STATE);
    }
  } catch (e) { console.warn('IDB boot check failed', e); }
  // After local recovery, attempt cloud sync (no-op if not connected).
  syncPullOnBoot();
})();
// Also pull when the device comes back online or the tab regains focus —
// catches the case where you finished a test on the iPad while the laptop
// tab was idle.
window.addEventListener('online', () => syncPullOnBoot());
document.addEventListener('visibilitychange', () => { if (!document.hidden) syncPullOnBoot(); });

// Local save (always). After saving locally, the cloud-sync layer (if
// connected) debounces a push to the user's private GitHub Gist.
const persist = debounce(()=>{
  STATE.lastModified = Date.now();
  Store.save(STATE);
  syncPushSoon();
}, 150);

/* ===========================================================
   CLOUD SYNC — private GitHub Gist
   ===========================================================
   Strategy: a single private Gist holds the full STATE JSON. Token + gist id
   live in localStorage (NOT inside STATE — otherwise pushing the state would
   leak the token). On boot we pull and last-writer-wins merge by
   `lastModified`. On every persist() we debounce a push by 5s.
   No data ever leaves the user's own GitHub account. */
const Sync = (() => {
  const TOKEN_KEY  = 'pmp_gist_token';
  const GIST_KEY   = 'pmp_gist_id';
  const LSYNC_KEY  = 'pmp_gist_last_sync';
  const FILENAME   = 'pmp-prep-state.json';
  const DESCRIPTION = 'PMP Prep — private progress sync (do not share)';
  const lsGet = (k) => { try { return localStorage.getItem(k) || ''; } catch { return ''; } };
  const lsSet = (k, v) => { try { v ? localStorage.setItem(k, v) : localStorage.removeItem(k); } catch {} };
  const getToken  = () => lsGet(TOKEN_KEY);
  const getGistId = () => lsGet(GIST_KEY);
  const getLastSync = () => parseInt(lsGet(LSYNC_KEY) || '0', 10);
  const isConnected = () => !!(getToken() && getGistId());
  const headers = () => ({
    'Authorization': 'token ' + getToken(),
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28',
  });
  async function connect(token) {
    if (!token || !/^(ghp_|github_pat_)/.test(token)) {
      throw new Error('Token must start with ghp_ or github_pat_');
    }
    lsSet(TOKEN_KEY, token);
    // Look for an existing gist with our filename so re-connecting on a
    // second device finds the same one instead of creating a duplicate.
    const list = await fetch('https://api.github.com/gists?per_page=100', { headers: headers() });
    if (!list.ok) {
      lsSet(TOKEN_KEY, '');
      if (list.status === 401) throw new Error('Invalid or expired token');
      throw new Error('GitHub error ' + list.status);
    }
    const gists = await list.json();
    const found = gists.find(g => g.files && g.files[FILENAME]);
    if (found) { lsSet(GIST_KEY, found.id); return { id: found.id, created: false }; }
    const create = await fetch('https://api.github.com/gists', {
      method: 'POST',
      headers: { ...headers(), 'Content-Type': 'application/json' },
      body: JSON.stringify({
        description: DESCRIPTION, public: false,
        files: { [FILENAME]: { content: JSON.stringify({ lastModified: 0, placeholder: true }) } },
      }),
    });
    if (!create.ok) throw new Error('Create failed: ' + create.status);
    const g = await create.json();
    lsSet(GIST_KEY, g.id);
    return { id: g.id, created: true };
  }
  async function pull() {
    if (!isConnected()) throw new Error('Not connected');
    const r = await fetch('https://api.github.com/gists/' + getGistId(), { headers: headers() });
    if (!r.ok) throw new Error('Pull failed: ' + r.status);
    const g = await r.json();
    const f = g.files && g.files[FILENAME];
    if (!f) throw new Error('Gist file missing');
    let content = f.content;
    if (f.truncated && f.raw_url) {
      const raw = await fetch(f.raw_url);
      if (raw.ok) content = await raw.text();
    }
    return JSON.parse(content);
  }
  async function push(state) {
    if (!isConnected()) throw new Error('Not connected');
    const r = await fetch('https://api.github.com/gists/' + getGistId(), {
      method: 'PATCH',
      headers: { ...headers(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: { [FILENAME]: { content: JSON.stringify(state) } } }),
    });
    if (!r.ok) throw new Error('Push failed: ' + r.status);
    lsSet(LSYNC_KEY, String(Date.now()));
  }
  function disconnect() { lsSet(TOKEN_KEY,''); lsSet(GIST_KEY,''); lsSet(LSYNC_KEY,''); }
  return { isConnected, connect, pull, push, disconnect, getGistId, getToken, getLastSync };
})();
const syncPushSoon = debounce(async () => {
  if (!Sync.isConnected() || !navigator.onLine) return;
  try { await Sync.push(STATE); }
  catch (e) { console.warn('Sync push failed:', e.message); }
}, 5000);
// Cloud-sync conflict rule: MERGE both sides so neither device ever loses
// data. Like a Google-account sync: any test you finish, any flag you toggle,
// any note you write — on either device — ends up on both. Concretely:
//   • attempts: union by id (each attempt has a unique id)
//   • flags / bookmarks: union (true wins)
//   • mastery / flashState: per-key, keep the record with the latest lastSeen
//   • qNotes / libNotes: per-key, keep the longer text (notes grow over time)
//   • studyDays: per-day, take max(qs) + max(mins) so multi-device days don't double-count
//   • courseProgress: per-course/chapter, take the later timestamp
//   • readPos: take whichever side was modified last
//   • settings: take whichever side was modified last
//   • currentAttempt: keep this device's (in-progress tests don't migrate cleanly)
// Trade-off: deleting a flag/note on one device may be re-introduced if the
// other device still has it. For PMP study data this is acceptable —
// additive merge is far safer than silent overwrites.
function mergeStates(local, remote) {
  const out = Store._default();
  // attempts: union by id
  const seen = new Set();
  const allA = [...(local.attempts||[]), ...(remote.attempts||[])];
  out.attempts = [];
  for (const a of allA) {
    if (!a || !a.id) continue;
    if (seen.has(a.id)) continue;
    seen.add(a.id);
    out.attempts.push(a);
  }
  out.attempts.sort((x,y) => (x.startedAt||0) - (y.startedAt||0));
  // currentAttempt: keep local's
  out.currentAttempt = local.currentAttempt || null;
  // flags & bookmarks: union (true wins)
  out.flags = Object.assign({}, remote.flags||{}, local.flags||{});
  out.bookmarks = Object.assign({}, remote.bookmarks||{}, local.bookmarks||{});
  // mastery & flashState: per-key, latest lastSeen wins
  const mergeByLastSeen = (a, b) => {
    const merged = {};
    const keys = new Set([...Object.keys(a||{}), ...Object.keys(b||{})]);
    for (const k of keys) {
      const x = a && a[k]; const y = b && b[k];
      if (!x) merged[k] = y;
      else if (!y) merged[k] = x;
      else merged[k] = ((x.lastSeen||0) >= (y.lastSeen||0)) ? x : y;
    }
    return merged;
  };
  out.mastery = mergeByLastSeen(local.mastery, remote.mastery);
  out.flashState = mergeByLastSeen(local.flashState, remote.flashState);
  // qNotes & libNotes: per-key, longer text wins (notes grow)
  const mergeNotes = (a, b) => {
    const merged = {};
    const keys = new Set([...Object.keys(a||{}), ...Object.keys(b||{})]);
    for (const k of keys) {
      const x = (a && a[k]) || ''; const y = (b && b[k]) || '';
      merged[k] = (x.length >= y.length) ? x : y;
    }
    return merged;
  };
  out.qNotes = mergeNotes(local.qNotes, remote.qNotes);
  out.libNotes = mergeNotes(local.libNotes, remote.libNotes);
  // studyDays: per-day max
  out.studyDays = {};
  const dayKeys = new Set([...Object.keys(local.studyDays||{}), ...Object.keys(remote.studyDays||{})]);
  for (const k of dayKeys) {
    const x = (local.studyDays||{})[k] || {qs:0,mins:0};
    const y = (remote.studyDays||{})[k] || {qs:0,mins:0};
    out.studyDays[k] = { qs: Math.max(x.qs||0, y.qs||0), mins: Math.max(x.mins||0, y.mins||0) };
  }
  // courseProgress: per-course/chapter, max timestamp
  out.courseProgress = {};
  const cpKeys = new Set([...Object.keys(local.courseProgress||{}), ...Object.keys(remote.courseProgress||{})]);
  for (const c of cpKeys) {
    const x = (local.courseProgress||{})[c] || {};
    const y = (remote.courseProgress||{})[c] || {};
    const merged = {};
    const chKeys = new Set([...Object.keys(x), ...Object.keys(y)]);
    for (const ch of chKeys) merged[ch] = Math.max(x[ch]||0, y[ch]||0);
    out.courseProgress[c] = merged;
  }
  // readPos & settings: whichever side was modified last
  const localNewer = (local.lastModified||0) >= (remote.lastModified||0);
  out.readPos = localNewer ? (local.readPos||{}) : (remote.readPos||{});
  out.settings = Object.assign({}, remote.settings||{}, localNewer ? (local.settings||{}) : {});
  out.lastModified = Math.max(local.lastModified||0, remote.lastModified||0);
  return out;
}
function summariseState(state) {
  const arr = (state && state.attempts) || [];
  let lastAt = 0;
  for (const a of arr) { const t = (a && a.endedAt) || 0; if (t > lastAt) lastAt = t; }
  return {
    attempts: arr.length,
    lastAttempt: lastAt ? new Date(lastAt).toLocaleString() : 'never',
    lastModified: state && state.lastModified ? new Date(state.lastModified).toLocaleString() : 'never',
  };
}
async function syncPullOnBoot() {
  if (!Sync.isConnected() || !navigator.onLine) return;
  try {
    const remote = await Sync.pull();
    if (!remote || remote.placeholder) {
      if ((STATE.attempts||[]).length || STATE.lastModified) await Sync.push(STATE);
      return;
    }
    // Merge instead of overwrite — neither side ever loses data.
    const before = STATE.attempts.length;
    const merged = mergeStates(STATE, remote);
    const changed = JSON.stringify(merged) !== JSON.stringify(STATE);
    if (changed) {
      STATE = merged;
      STATE.lastModified = Date.now();
      Store.save(STATE);
      try { IDB.put(STATE); } catch {}
      if (typeof rebuildCatalog === 'function') rebuildCatalog();
      if (typeof applyTheme === 'function') applyTheme();
      if (typeof render === 'function') render();
      const gained = STATE.attempts.length - before;
      if (gained > 0) { try { toast('Synced ' + gained + ' new attempt' + (gained>1?'s':'') + ' from cloud', 'success'); } catch {} }
    }
    // Push merged state up so the cloud also has the union.
    await Sync.push(STATE);
  } catch (e) { console.warn('Sync pull failed:', e.message); }
}

/* ---------------- Question id ---------------- */
const qid = (q) => `${q.section}::${q.num}`;

/* ---------------- Question Bank: index by section ----------------
   Note: q.topic (Knowledge Area) is taken verbatim from the source PDF's
   per-question tags. We do NOT infer PMI domains (People/Process/Business
   Environment) since the book does not provide that mapping. */
const BANK = (() => {
  const all = window.PMP_QUESTIONS || [];
  const sections = new Map();
  for (const q of all) {
    const s = q.section;
    if (!sections.has(s)) sections.set(s, []);
    q._id = qid(q);
    sections.get(s).push(q);
  }
  return { all, sections };
})();

/* ---------------- Test catalog (30 sections) ---------------- */
function classifySection(name) {
  if (/Mock Exam/i.test(name)) return { kind:'mock', defaultMode:'exam' };
  if (/Knowledge Area Quiz/i.test(name)) return { kind:'ka', defaultMode:'study' };
  if (/Focus Area Test/i.test(name)) return { kind:'focus', defaultMode:'study' };
  return { kind:'other', defaultMode:'study' };
}

// PMI pacing: CAPM = 150q/180min, PMP = 180q/230min ≈ 75 sec/question.
// Per user override: every Exam-mode test gets a flat 60-minute timer
// regardless of question count.
const SEC_PER_Q_EXAM = 75;
const examMinutesFor = (count) => 60;

let CATALOG = [];
function rebuildCatalog() {
  const fromBank = Array.from(BANK.sections.entries()).map(([name, qs]) => {
    const meta = classifySection(name);
    return { id: name, name, count: qs.length, ...meta, examMin: examMinutesFor(qs.length), questions: qs };
  });
  CATALOG = fromBank;
}

/* ---------------- Theme ---------------- */
function applyTheme() {
  const t = STATE.settings.theme;
  const dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.classList.toggle('dark', dark);
}
applyTheme();
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);

/* ---------------- Router ---------------- */
const routes = {};
function route(path, fn) { routes[path] = fn; }
function navigate(path) {
  if (location.hash !== '#'+path) { location.hash = '#'+path; return; }
  render();
}
window.addEventListener('hashchange', render);
window.addEventListener('load', () => { if (!location.hash) location.hash = '#/'; render(); });

function render() {
  const hash = location.hash.replace(/^#/, '') || '/';
  const [path, ...rest] = hash.split('/').filter(Boolean);
  const root = '/'+(path||'');
  // parametric matches
  if (root === '/test' && rest.length) return routes['/test/:id'](decodeURIComponent(rest.join('/')));
  if (root === '/results' && rest.length) return routes['/results/:id'](decodeURIComponent(rest.join('/')));
  if (root === '/history' && rest.length) return routes['/history/:id'](decodeURIComponent(rest.join('/')));
  const fn = routes[root] || routes['/'];
  fn();
}

function computeOverallStats() {
  const attempts = STATE.attempts.length;
  const avgPct = attempts ? Math.round(STATE.attempts.reduce((s,a)=>s+a.scorePct,0)/attempts) : 0;
  let wrongCount = 0;
  const wrongSet = new Set();
  for (const a of STATE.attempts) for (const r of a.responses) if (r.correct === false) wrongSet.add(r.qid);
  // remove mastered ones from wrong queue
  for (const id of wrongSet) {
    const m = STATE.mastery[id];
    if (!(m && m.correct >= 1 && (m.correct - m.wrong) >= 1)) wrongCount++;
  }
  let mastered = 0;
  for (const id in STATE.mastery) {
    const m = STATE.mastery[id];
    if (m.correct >= 2 && m.correct > m.wrong) mastered++;
  }
  return { attempts, avgPct, wrongCount, mastered };
}

/* ---------------- Due-today queue ----------------
   Returns qids whose SM-2 `due` timestamp has passed and the user has
   actually engaged with them (lastSeen set). These are the items
   spaced-repetition says you should review *today*. */
function computeDueIds() {
  const now = Date.now();
  const ids = [];
  for (const id in STATE.mastery) {
    const m = STATE.mastery[id];
    if (m && m.lastSeen && m.due && m.due <= now) ids.push(id);
  }
  return ids;
}

/* ---------------- Readiness score ----------------
   Honest 0-100 self-assessment derived from your bank performance.
   It is NOT a PMI exam-pass predictor. Three signals:

     50%  KA-balanced accuracy: average of per-KA accuracies across all
          KAs you've answered (so heavy study in 1 KA + zero in others
          can't carry the score). Capped at 80% baseline so the rest must
          come from mocks.
     30%  Latest-3 mock-exam average. Zero if you haven't taken any.
     20%  Coverage: % of bank you've answered at least once.            */
function computeReadiness() {
  // KA-balanced accuracy
  const byKA = {};
  for (const a of STATE.attempts) {
    const test = CATALOG.find(t => t.id === a.testId);
    if (!test) continue;
    for (let i=0; i<a.responses.length; i++) {
      const r = a.responses[i], q = test.questions[i];
      if (!r || !r.choice || !q) continue;
      const k = q.topic || 'Unknown';
      byKA[k] = byKA[k] || { c:0, t:0 };
      byKA[k].t++; if (r.correct) byKA[k].c++;
    }
  }
  const kas = Object.values(byKA);
  const kaAvg = kas.length ? kas.reduce((s,k)=>s+(k.c/k.t),0)/kas.length : 0;

  // Latest 3 mocks
  const mocks = STATE.attempts
    .filter(a => /Mock Exam/i.test(a.testId))
    .slice(-3);
  const mockAvg = mocks.length ? mocks.reduce((s,a)=>s+a.scorePct/100,0)/mocks.length : 0;

  // Coverage
  const answered = new Set();
  for (const a of STATE.attempts) for (const r of a.responses) if (r.choice) answered.add(r.qid);
  const coverage = BANK.all.length ? answered.size / BANK.all.length : 0;

  const parts = {
    accuracy: Math.round(kaAvg*100),
    mocks:    Math.round(mockAvg*100),
    coverage: Math.round(coverage*100),
    kaCount:  kas.length,
    mockCount: mocks.length,
  };
  const score = Math.round((kaAvg*0.5 + mockAvg*0.3 + coverage*0.2) * 100);

  let band, bandLabel, bandColor;
  if (score < 40)      { band='building';   bandLabel='Building foundation'; bandColor='rose'; }
  else if (score < 65) { band='practicing'; bandLabel='Practice phase';      bandColor='amber'; }
  else if (score < 80) { band='sharpening'; bandLabel='Sharpening';          bandColor='brand'; }
  else                 { band='ready';      bandLabel='Exam-ready';          bandColor='emerald'; }

  return { score, band, bandLabel, bandColor, parts };
}

/* ---------------- Confidence calibration ----------------
   For every response that has a `confidence` tag, we know if it was
   correct. Returns accuracy bucketed by confidence + Brier score
   (mean squared error between stated confidence and outcome). */
function computeCalibration() {
  const buckets = { low:{n:0,c:0}, med:{n:0,c:0}, high:{n:0,c:0} };
  // Brier: confidence -> probability mapping
  const probMap = { low:0.33, med:0.66, high:0.90 };
  let brierSum = 0, brierN = 0;
  for (const a of STATE.attempts) {
    for (const r of a.responses) {
      if (!r.confidence || r.correct == null) continue;
      const b = buckets[r.confidence];
      if (!b) continue;
      b.n++; if (r.correct) b.c++;
      brierSum += Math.pow(probMap[r.confidence] - (r.correct?1:0), 2);
      brierN++;
    }
  }
  const brier = brierN ? brierSum/brierN : null;
  return { buckets, brier, total: brierN };
}

function showTour(forced=false) {
  if (!forced && STATE.settings.tourSeen) return;
  // Guard against duplicate overlays (the home route can render twice on
  // initial load, which would stack two tours and intercept clicks).
  if (document.getElementById('tour-overlay')) return;
  let step = 0;
  const overlay = document.createElement('div');
  overlay.className = 'fixed inset-0 z-50 bg-slate-900/70 backdrop-blur-sm flex items-center justify-center p-4 fade-in';
  overlay.id = 'tour-overlay';
  document.body.appendChild(overlay);

  const renderStep = () => {
    const s = TOUR_STEPS[step];
    overlay.innerHTML = html`
      <div class="max-w-lg w-full rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-lift overflow-hidden">
        <div class="bg-gradient-to-br from-brand-600 to-brand-800 text-white px-6 py-5">
          <div class="text-[11px] font-semibold uppercase tracking-[0.16em] text-brand-200">Step ${step+1} of ${TOUR_STEPS.length}</div>
          <h2 class="text-xl font-bold mt-1">${s.title}</h2>
        </div>
        <div class="px-6 py-5 text-sm leading-relaxed text-slate-700 dark:text-slate-300 space-y-1 max-h-[55vh] overflow-y-auto">
          ${s.body}
        </div>
        <div class="px-6 py-4 bg-slate-50 dark:bg-slate-950 border-t border-slate-200 dark:border-slate-800 flex items-center justify-between gap-3">
          <button id="tour-skip" class="text-xs text-slate-500 hover:text-slate-700 dark:hover:text-slate-300">Skip tour</button>
          <div class="flex items-center gap-2">
            <div class="flex gap-1">
              ${TOUR_STEPS.map((_,i)=>`<span class="w-1.5 h-1.5 rounded-full ${i===step?'bg-brand-600':'bg-slate-300 dark:bg-slate-700'}"></span>`).join('')}
            </div>
            ${step>0 ? `<button id="tour-prev" class="px-3 py-1.5 rounded-lg border border-slate-200 dark:border-slate-800 text-sm hover:bg-slate-100 dark:hover:bg-slate-800">← Back</button>` : ''}
            <button id="tour-next" class="px-4 py-1.5 rounded-lg bg-brand-600 text-white text-sm font-semibold hover:bg-brand-700">${step===TOUR_STEPS.length-1?'Get started':'Next →'}</button>
          </div>
        </div>
      </div>`;
    $('#tour-skip').onclick = close;
    const pb = $('#tour-prev'); if (pb) pb.onclick = () => { step--; renderStep(); };
    $('#tour-next').onclick = () => {
      if (step < TOUR_STEPS.length-1) { step++; renderStep(); }
      else close();
    };
  };

  const close = () => {
    STATE.settings.tourSeen = true;
    persist();
    overlay.remove();
    document.onkeydown = null;
  };

  document.onkeydown = (e) => {
    if (e.key === 'Escape') close();
    else if (e.key === 'ArrowRight' || e.key === 'Enter') $('#tour-next').click();
    else if (e.key === 'ArrowLeft') { const p = $('#tour-prev'); if (p) p.click(); }
  };

  renderStep();
}

/* ---------------- Weak-area drill ----------------
   Identifies the user's lowest-accuracy KAs (with a minimum sample
   threshold so we don't punish a 1/2 fluke) and builds a 15-question
   session weighted toward those areas. Returns null if not enough
   data to be meaningful.                                         */
function computeWeakAreas(minSamples=4) {
  const byKA = {};
  for (const a of STATE.attempts) {
    const test = CATALOG.find(t => t.id === a.testId);
    if (!test) continue;
    for (let i=0; i<a.responses.length; i++) {
      const q = test.questions[i], r = a.responses[i];
      if (!r || !r.choice || !q) continue;
      const k = q.topic || 'Unknown';
      byKA[k] = byKA[k] || { c:0, t:0, ids:new Set() };
      byKA[k].t++; if (r.correct) byKA[k].c++;
      byKA[k].ids.add(r.qid);
    }
  }
  const areas = Object.entries(byKA)
    .filter(([k,v]) => v.t >= minSamples && k !== 'Unknown')
    .map(([k,v]) => ({ topic:k, acc: v.c/v.t, samples:v.t }))
    .sort((a,b) => a.acc - b.acc);
  return areas;
}

function buildDrillSession(target=15) {
  const weak = computeWeakAreas();
  if (!weak.length) return null;
  // Take bottom 3 KAs (or fewer if user only studied 1-2).
  const focus = weak.slice(0, Math.min(3, weak.length));
  const focusTopics = new Set(focus.map(w => w.topic));
  // Source pool: full bank + custom-test questions, restricted to focus topics.
  const pool = [];
  for (const q of BANK.all) if (focusTopics.has(q.topic)) pool.push(q);
  if (!pool.length) return null;
  // Prioritise: items previously wrong > items unanswered > items answered correctly.
  // Build a score per question; lower = more important to drill.
  const wrongIds = new Set();
  const answeredIds = new Set();
  for (const a of STATE.attempts) for (const r of a.responses) {
    if (r.choice) answeredIds.add(r.qid);
    if (r.correct === false) wrongIds.add(r.qid);
  }
  const ranked = pool.map(q => {
    const m = STATE.mastery[q._id];
    let score = 3;
    if (wrongIds.has(q._id)) score = 0;
    else if (!answeredIds.has(q._id)) score = 1;
    else if (m && m.correct >= 2 && m.correct > m.wrong) score = 4;  // mastered: deprioritise
    return { q, score };
  }).sort((a,b) => a.score - b.score || Math.random() - 0.5);
  const picked = ranked.slice(0, target).map(r => r.q);
  return { questions: shuffle(picked), focus };
}

route('/test/:id', (id) => {
  const test = CATALOG.find(t => t.id === id);
  if (!test) { mount(shell(`<p>Test not found.</p>`)); return; }

  // 1) If a different test is in progress, ask before discarding.
  let A = STATE.currentAttempt;
  if (A && A.testId !== id) {
    if (!confirm(`You have an in-progress attempt for “${A.testId}”. Discard it and start “${id}”?`)) {
      navigate('/test/'+encodeURIComponent(A.testId));
      return;
    }
    STATE.currentAttempt = null; A = null; persist();
  }

  // 2) No attempt yet → show the mode picker.
  if (!A) {
    renderModePicker(test);
    return;
  }

  // 3) In-progress attempt: ensure it has a mode (legacy attempts default to exam).
  if (!A.mode) { A.mode = 'exam'; persist(); }
  renderRunner(test, A);
});

function startAttempt(test, mode) {
  const A = {
    id: uid(),
    testId: test.id,
    mode,                                  // 'study' | 'exam'
    startedAt: Date.now(),
    durationMin: mode === 'exam' ? test.examMin : null,
    idx: 0,
    responses: test.questions.map(q => ({
      qid: q._id, choice: null, correct: null,
      flagged: !!STATE.flags[q._id], timeMs: 0,
      revealed: false,                     // study-mode: did the user submit & see feedback?
      peeked: false, peekedLetter: null    // study-mode peek/hint usage
    })),
    lastTickAt: Date.now(),
    finished: false,
  };
  STATE.currentAttempt = A;
  persist();
  renderRunner(test, A);
}

function renderRunner(test, A) {
  const isExam = A.mode === 'exam';
  const useConfidence = !isExam && STATE.settings.confidenceCapture;

  const renderQ = () => {
    const q = test.questions[A.idx];
    const r = A.responses[A.idx];
    const elapsedSec = (Date.now() - A.startedAt)/1000;
    const totalSec = isExam ? A.durationMin*60 : null;
    const remainingSec = isExam ? totalSec - elapsedSec : null;
    const answered = A.responses.filter(x=>x.choice).length;

    const showFeedback = !isExam && r.revealed && r.choice;
    // In confidence-capture mode, between pick and reveal we ask the user
    // to commit a confidence level. Only when r.choice && !r.revealed && !r.confidence
    // && useConfidence is the picker shown.
    const askConfidence = useConfidence && !!r.choice && !r.revealed && !r.confidence;

    const optHtml = ['A','B','C','D'].map(letter => {
      const selected = r.choice === letter;
      const isAnswer = q.correct === letter;
      const eliminated = r.peekedLetter === letter && !showFeedback;
      let cls;
      if (showFeedback) {
        if (isAnswer)             cls = 'border-emerald-500 bg-emerald-50 dark:bg-emerald-900/30 dark:border-emerald-400';
        else if (selected)        cls = 'border-rose-500 bg-rose-50 dark:bg-rose-900/30 dark:border-rose-400';
        else                      cls = 'border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 opacity-60';
      } else if (eliminated) {
        cls = 'border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 opacity-40 line-through';
      } else {
        cls = selected ? 'border-brand-500 bg-brand-50 dark:bg-brand-900/30 dark:border-brand-400'

      }
      const badgeBg = showFeedback && isAnswer ? 'bg-emerald-600 text-white'
                    : showFeedback && selected ? 'bg-rose-600 text-white'
                    : selected                 ? 'bg-brand-600 text-white'
                    :                            'bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300';
      return html`
        <button data-letter="${letter}" ${showFeedback||eliminated?'disabled':''} class="opt-btn w-full text-left p-4 rounded-xl border-2 ${cls}">
          <div class="flex gap-3">
            <span class="flex-shrink-0 w-7 h-7 rounded-full ${badgeBg} font-semibold flex items-center justify-center text-sm">${letter}</span>
            <span class="flex-1 leading-relaxed">${escapeHtml(q.options[letter]||'')}</span>

    }).join('');

    const dots = A.responses.map((rr,i)=>{
      const cls = i===A.idx ? 'bg-brand-600 text-white' :
                  rr.flagged ? 'bg-amber-200 dark:bg-amber-700 text-amber-900 dark:text-amber-100' :
                  rr.choice ? (isExam ? 'bg-slate-300 dark:bg-slate-700 text-slate-800 dark:text-slate-200'
                                      : (rr.correct ? 'bg-emerald-200 dark:bg-emerald-800 text-emerald-900 dark:text-emerald-100'
                                                    : 'bg-rose-200 dark:bg-rose-800 text-rose-900 dark:text-rose-100')) :
                  'bg-slate-100 dark:bg-slate-900 text-slate-400 border border-slate-200 dark:border-slate-800';
      return `<button data-jump="${i}" class="w-7 h-7 rounded-md text-xs font-semibold ${cls}">${i+1}</button>`;
    }).join('');

    const modeBadge = isExam
      ? '<span class="text-[10px] font-bold uppercase tracking-[0.12em] px-2 py-0.5 rounded-full bg-rose-100 text-rose-700 dark:bg-rose-900/40 dark:text-rose-300">Exam Mode</span>'

    const timerHtml = isExam
      ? `<div id="timer" class="font-mono text-sm px-3 py-1.5 rounded-lg bg-slate-100 dark:bg-slate-800 ${remainingSec<60?'text-rose-600 timer-urgent':''}">${fmtTime(remainingSec)}</div>`
      : `<div id="timer" class="font-mono text-sm px-3 py-1.5 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400" title="Elapsed (no time limit in Study Mode)">${fmtTime(elapsedSec)}</div>`;

    const feedbackPanel = showFeedback ? html`
      <div class="mt-5 rounded-xl ${r.correct?'bg-emerald-50 dark:bg-emerald-900/20 border-emerald-200 dark:border-emerald-800':'bg-rose-50 dark:bg-rose-900/20 border-rose-200 dark:border-rose-800'} border p-4">

          ${r.peeked ? `<span class="text-[10px] px-1.5 py-0.5 rounded bg-amber-100 dark:bg-amber-900/40 text-amber-800 dark:text-amber-300" title="You used Peek — mastery interval grows more slowly">💡 peeked</span>` : ''}

    const confidencePanel = askConfidence ? html`

        <p class="text-xs text-slate-500 mb-3">Honest tracking calibrates your judgment. We'll show you, over time, whether your "high confidence" answers actually match your accuracy.</p>
        <div class="flex flex-wrap gap-2">
          <button data-conf="low"  class="conf-btn px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 hover:border-rose-400 hover:bg-rose-50 dark:hover:bg-rose-900/20 text-sm font-medium">🤔 Low — guessing</button>
          <button data-conf="med"  class="conf-btn px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 hover:border-amber-400 hover:bg-amber-50 dark:hover:bg-amber-900/20 text-sm font-medium">🤷 Medium — leaning</button>
          <button data-conf="high" class="conf-btn px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 hover:border-emerald-400 hover:bg-emerald-50 dark:hover:bg-emerald-900/20 text-sm font-medium">💪 High — confident</button>
        </div>
      </div>` : '';

    const submitLabel = isExam
      ? (A.idx===test.questions.length-1 ? 'Submit ✓' : 'Next →')
      : (showFeedback ? (A.idx===test.questions.length-1 ? 'Submit ✓' : 'Next →') : 'Submit answer');

    const content = html`
      <div class="grid lg:grid-cols-[1fr,260px] gap-6">
        <section>
          <div class="flex items-center justify-between mb-4 gap-3 flex-wrap">
            <div class="min-w-0">
              <div class="flex items-center gap-2 mb-0.5 flex-wrap">
                ${modeBadge}
                <div class="text-xs uppercase tracking-wider text-slate-500 truncate">${escapeHtml(test.name)}</div>
              </div>
              <div class="text-sm text-slate-500">Question <strong class="text-slate-900 dark:text-slate-100">${A.idx+1}</strong> of ${test.questions.length} · <span class="text-slate-700 dark:text-slate-300">${escapeHtml(q.topic||'—')}</span></div>
            </div>
            <div class="flex items-center gap-2">
              ${timerHtml}
              <button id="flag-btn" class="px-3 py-1.5 rounded-lg text-sm border ${r.flagged?'bg-amber-100 dark:bg-amber-900/40 border-amber-300 dark:border-amber-700 text-amber-800 dark:text-amber-200':'border-slate-200 dark:border-slate-800 hover:bg-slate-100 dark:hover:bg-slate-800'}" title="Flag (F)">⚑ Flag</button>

            <div class="flex items-center gap-2">
              ${!isExam && !showFeedback && !r.peeked ? `<button id="peek-btn" class="px-3 py-2 rounded-lg text-sm border border-amber-200 dark:border-amber-800 text-amber-700 dark:text-amber-300 bg-amber-50/50 dark:bg-amber-900/20 hover:bg-amber-100 dark:hover:bg-amber-900/40" title="Eliminate one wrong option. Reduces mastery credit if you answer correctly.">💡 Peek</button>`:''}
              <button id="end-btn" class="px-4 py-2 rounded-lg text-sm bg-rose-50 dark:bg-rose-900/30 text-rose-700 dark:text-rose-300 hover:bg-rose-100 dark:hover:bg-rose-900/50 border border-rose-200 dark:border-rose-800">End test</button>
              <button id="next-btn" class="px-4 py-2 rounded-lg text-sm bg-brand-600 text-white hover:bg-brand-700 font-semibold disabled:opacity-50 disabled:cursor-not-allowed" ${(!isExam && !showFeedback && !r.choice) || askConfidence ? 'disabled':''} ${askConfidence?'title="Pick a confidence level above to reveal"':''}>${submitLabel}</button>
            </div>
          </div>
        </section>
        <aside class="lg:sticky lg:top-20 self-start">
          <div class="rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-4">
            <div class="flex items-center justify-between mb-2 text-sm">
              <strong>Progress</strong>
              <span class="text-slate-500">${answered}/${test.questions.length}</span>
            </div>
            <div class="h-1.5 rounded-full bg-slate-100 dark:bg-slate-800 mb-3 overflow-hidden">
              <div class="h-full bg-brand-500" style="width:${(answered/test.questions.length)*100}%"></div>
            </div>
            <div class="grid grid-cols-8 lg:grid-cols-7 gap-1.5">${dots}</div>
            <div class="mt-3 text-xs text-slate-500 space-y-1">
              <div class="flex items-center gap-1.5"><span class="inline-block w-3 h-3 rounded bg-brand-600"></span>Current</div>
              ${isExam
                ? '<div class="flex items-center gap-1.5"><span class="inline-block w-3 h-3 rounded bg-slate-300 dark:bg-slate-700"></span>Answered</div>'
                : '<div class="flex items-center gap-1.5"><span class="inline-block w-3 h-3 rounded bg-emerald-200 dark:bg-emerald-800"></span>Correct</div><div class="flex items-center gap-1.5"><span class="inline-block w-3 h-3 rounded bg-rose-200 dark:bg-rose-800"></span>Wrong</div>'}
              <div class="flex items-center gap-1.5"><span class="inline-block w-3 h-3 rounded bg-amber-200 dark:bg-amber-700"></span>Flagged</div>
              <div class="flex items-center gap-1.5"><span class="inline-block w-3 h-3 rounded bg-slate-100 border border-slate-200 dark:bg-slate-900 dark:border-slate-800"></span>Unanswered</div>
            </div>
            <div class="mt-3 pt-3 border-t border-slate-200 dark:border-slate-800 text-xs text-slate-500">
              <div class="font-semibold text-slate-700 dark:text-slate-300 mb-1">Shortcuts</div>
              <div>1–4 select · ←/→ nav · F flag · ${!isExam?'P peek · ':''}Enter ${isExam?'next':'submit/next'}</div>
            </div>
          </div>
        </aside>
      </div>`;

    mount(shell(content));

    // After a render that should reorient the user (new question or just-revealed
    // feedback), scroll the question card to just below the sticky header. We
    // only do this when renderQ is invoked from a navigation/reveal action — not
    // from in-place tweaks like option pick, flag, or confidence — to avoid
    // jarring scroll jumps on every click. The flag is set by callers via
    // renderQ.__scroll = true before invocation; consumed and cleared here.
    if (renderQ.__scroll) {
      renderQ.__scroll = false;
      requestAnimationFrame(() => {
        const card = document.getElementById('question-card');
        if (card) {
          // Only scroll if the card isn't already nicely in view at the top.
          const rect = card.getBoundingClientRect();
          if (rect.top < 0 || rect.top > 120) {
            card.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        }
      });
    }

    // Wire interactions
    $$('.opt-btn').forEach(btn => btn.onclick = () => pick(btn.dataset.letter));
    $$('.conf-btn').forEach(btn => btn.onclick = () => {
      A.responses[A.idx].confidence = btn.dataset.conf;
      persist();
      renderQ();
    });
    $('#prev-btn').onclick = prev;
    $('#next-btn').onclick = next;
    $('#flag-btn').onclick = toggleFlag;
    const peekBtn = $('#peek-btn');
    if (peekBtn) peekBtn.onclick = () => {
      const cur = A.responses[A.idx];
      if (cur.peeked || cur.revealed) return;
      // Eliminate a random wrong distractor that the user hasn't selected.
      const wrongs = ['A','B','C','D'].filter(L => L !== q.correct && L !== cur.choice);
      if (!wrongs.length) return;
      cur.peekedLetter = wrongs[Math.floor(Math.random()*wrongs.length)];
      cur.peeked = true;
      // If the user had selected the eliminated option, clear it.
      if (cur.choice === cur.peekedLetter) { cur.choice = null; cur.correct = null; }
      persist();
      renderQ();
    };
    $('#end-btn').onclick = () => { if (confirm('End the test now and see results?')) finish(); };
    $$('[data-jump]').forEach(b => b.onclick = () => { trackTime(); A.idx = +b.dataset.jump; persist(); renderQ.__scroll = true; renderQ(); });

    // Timer tick (countdown for exam, elapsed for study)
    if (window.__pmpTimer) clearInterval(window.__pmpTimer);
    window.__pmpTimer = setInterval(() => {
      const t = $('#timer'); if (!t) return;
      if (isExam) {
        const rem = totalSec - (Date.now() - A.startedAt)/1000;
        t.textContent = fmtTime(rem);
        if (rem < 60) t.classList.add('text-rose-600','timer-urgent');
        if (rem <= 0) { clearInterval(window.__pmpTimer); finish(); }
      } else {
        t.textContent = fmtTime((Date.now() - A.startedAt)/1000);
      }
    }, 500);

    // Keyboard
    document.onkeydown = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (['1','2','3','4'].includes(e.key)) { pick(['A','B','C','D'][+e.key-1]); }
      else if (e.key === 'ArrowRight' || e.key === 'Enter') { next(); }
      else if (e.key === 'ArrowLeft') { prev(); }
      else if (e.key.toLowerCase() === 'f') { toggleFlag(); }
      else if (e.key.toLowerCase() === 'p' && !isExam) { const pb = $('#peek-btn'); if (pb) pb.click(); }
    };

    function trackTime() {
      const now = Date.now();
      A.responses[A.idx].timeMs += now - A.lastTickAt;
      A.lastTickAt = now;
    }
    function pick(letter) {
      // In Study Mode, once revealed, no changes.
      if (!isExam && A.responses[A.idx].revealed) return;
      // Block picking an eliminated option.
      if (A.responses[A.idx].peekedLetter === letter) return;
      trackTime();
      A.responses[A.idx].choice = letter;
      A.responses[A.idx].correct = letter === q.correct;
      persist();
      // Re-render to update visual state (selection in exam, or just selection in study).
      renderQ();
    }
    function prev() { trackTime(); if (A.idx>0) A.idx--; persist(); renderQ.__scroll = true; renderQ(); }
    function next() {
      trackTime();
      const cur = A.responses[A.idx];
      // Study Mode: first Enter/Next reveals feedback; second moves on.
      if (!isExam && cur.choice && !cur.revealed) {
        cur.revealed = true;
        // Update mastery immediately on reveal so it counts
        updateMasteryForResponse(q, cur);
        // Credit the study streak: each revealed question = 1 study unit today.
        markStudyToday(1, 0);
        persist();
        renderQ.__scroll = true;
        renderQ();
        return;
      }
      if (A.idx === test.questions.length-1) {
        if (confirm('Submit the test?')) finish();
      } else { A.idx++; persist(); renderQ.__scroll = true; renderQ(); }
    }
    function toggleFlag() {
      A.responses[A.idx].flagged = !A.responses[A.idx].flagged;
      const id = q._id;
      if (A.responses[A.idx].flagged) STATE.flags[id] = true; else delete STATE.flags[id];
      persist(); renderQ();
    }
  };

  const finish = () => {
    if (window.__pmpTimer) clearInterval(window.__pmpTimer);
    document.onkeydown = null;
    const A2 = STATE.currentAttempt;
    if (!A2) return;
    A2.responses[A2.idx].timeMs += Date.now() - A2.lastTickAt;
    let correct = 0;
    for (let i=0;i<A2.responses.length;i++) {
      const q = test.questions[i];
      const r = A2.responses[i];
      r.correct = r.choice === q.correct;
      if (r.correct) correct++;
      // In Exam Mode mastery updates here. In Study Mode it already updated on reveal,
      // so only update for any unrevealed (e.g., user ended early).
      if (A2.mode === 'exam' || !r.revealed) updateMasteryForResponse(q, r);
    }
    A2.finished = true;
    A2.endedAt = Date.now();
    A2.scorePct = Math.round((correct/test.questions.length)*100);
    A2.correct = correct;
    A2.total = test.questions.length;
    STATE.attempts.push(A2);
    STATE.currentAttempt = null;
    markStudyToday(
      A2.responses.filter(r => r.choice).length,
      Math.round((A2.endedAt - A2.startedAt)/60000)
    );
    persist();
    navigate('/results/'+encodeURIComponent(A2.id));
  };

  renderQ();
}

function updateMasteryForResponse(q, r) {
  if (!r.choice) return;
  const m = STATE.mastery[q._id] || { correct:0, wrong:0, ef:2.5, interval:0, due:0, lastSeen:0 };
  if (r.correct) m.correct++; else m.wrong++;
  m.lastSeen = Date.now();
  // Peek penalty: a correct-after-peek answer still counts, but with a
  // reduced SM-2 grade so the interval doesn't grow as aggressively.
  // Wrong stays wrong regardless of peek.
  let grade;
  if (r.correct) grade = r.peeked ? 3 : 5;
  else           grade = 2;
  m.ef = Math.max(1.3, m.ef + (0.1 - (5-grade)*(0.08 + (5-grade)*0.02)));
  m.interval = r.correct ? (m.interval ? Math.round(m.interval * m.ef) : 1) : 0;
  m.due = Date.now() + m.interval*86400000;
  STATE.mastery[q._id] = m;
}

route('/history/:id', (id) => {
  const A = STATE.attempts.find(a => a.id === id);
  if (!A) { mount(shell(`<p>Attempt not found.</p>`)); return; }
  const test = CATALOG.find(t => t.id === A.testId);

  let filter = 'all'; // all, wrong, flagged, correct, unanswered

  const renderList = () => {
    const items = test.questions.map((q,i)=>({q, r:A.responses[i], i})).filter(({q,r}) => {
      if (filter==='wrong') return r.correct === false;
      if (filter==='correct') return r.correct === true;
      if (filter==='flagged') return r.flagged;
      if (filter==='unanswered') return !r.choice;
      return true;
    });

    const list = items.map(({q,r,i})=>renderHistoryCard(q,r,i)).join('');

    const filterBtn = (k,label,count) => html`
      <button data-f="${k}" class="px-3 py-1.5 rounded-lg text-sm ${filter===k?'bg-brand-600 text-white':'bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700'}">
        ${label} <span class="ml-1 text-xs opacity-70">${count}</span>
      </button>`;

    const counts = {
      all: A.responses.length,
      wrong: A.responses.filter(r=>r.correct===false).length,
      correct: A.responses.filter(r=>r.correct===true).length,
      flagged: A.responses.filter(r=>r.flagged).length,
      unanswered: A.responses.filter(r=>!r.choice).length,
    };

    const content = html`
      <div class="mb-4 flex items-baseline justify-between">
        <div>
          <a href="#/results/${encodeURIComponent(A.id)}" class="text-sm text-brand-600 dark:text-brand-400 hover:underline">← Results</a>
          <h1 class="text-2xl font-bold mt-1">Answer review</h1>
          <p class="text-sm text-slate-500">${escapeHtml(test.name)} · ${new Date(A.endedAt).toLocaleString()}</p>
        </div>
      </div>
      <div class="flex flex-wrap gap-2 mb-4 no-print">
        ${filterBtn('all','All',counts.all)}
        ${filterBtn('wrong','Wrong',counts.wrong)}
        ${filterBtn('correct','Correct',counts.correct)}
        ${filterBtn('flagged','Flagged',counts.flagged)}
        ${filterBtn('unanswered','Unanswered',counts.unanswered)}
      </div>
      <div class="space-y-4">${list || '<p class="text-slate-500">No questions match this filter.</p>'}</div>`;

    mount(shell(content));
    $$('[data-f]').forEach(b => b.onclick = () => { filter = b.dataset.f; renderList(); });
    $$('.qnote-btn').forEach(b => b.onclick = () => {
      const qid = b.dataset.qid;
      const cur = STATE.qNotes[qid] || '';
      const next = prompt('Personal note for this question:\n(Leave empty to delete)', cur);
      if (next === null) return;
      if (next.trim()) STATE.qNotes[qid] = next.trim();
      else delete STATE.qNotes[qid];
      Store.save();
      renderList();
    });
  };

  renderList();
});

function renderHistoryCard(q, r, i) {
  const isWrong = r.correct === false;
  const isCorrect = r.correct === true;
  const opts = ['A','B','C','D'].map(letter => {
    const isPick = r.choice === letter;
    const isAnswer = q.correct === letter;
    let cls = 'border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900';
    let badge = '';
    if (isAnswer) { cls = 'border-emerald-400 bg-emerald-50 dark:bg-emerald-900/20 dark:border-emerald-600'; badge = '<span class="ml-2 text-xs font-semibold text-emerald-700 dark:text-emerald-400">✓ Correct answer</span>'; }
    if (isPick && !isAnswer) { cls = 'border-rose-400 bg-rose-50 dark:bg-rose-900/20 dark:border-rose-600'; badge = '<span class="ml-2 text-xs font-semibold text-rose-700 dark:text-rose-400">✗ Your answer</span>'; }
    if (isPick && isAnswer) { badge = '<span class="ml-2 text-xs font-semibold text-emerald-700 dark:text-emerald-400">✓ Your answer (correct)</span>'; }
    const distractorNote = (!isAnswer && letter !== r.choice) ? html`<div class="mt-1 text-xs text-slate-500 italic">Why not ${letter}? ${escapeHtml(distractorReason(q, letter))}</div>` : '';
    return html`
      <div class="p-3 rounded-lg border ${cls}">
        <div class="flex items-start gap-2">
          <span class="flex-shrink-0 w-6 h-6 rounded-full bg-slate-100 dark:bg-slate-800 text-xs font-semibold flex items-center justify-center">${letter}</span>
          <div class="flex-1 text-sm">
            <span>${escapeHtml(q.options[letter]||'')}</span>${badge}
            ${distractorNote}
          </div>
        </div>
      </div>`;
  }).join('');

  const statusBadge = isCorrect ? '<span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300">Correct</span>'
                    : isWrong ? '<span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-rose-100 text-rose-700 dark:bg-rose-900/40 dark:text-rose-300">Wrong</span>'
                    : '<span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-slate-100 text-slate-600 dark:bg-slate-800 dark:text-slate-300">Unanswered</span>';

        <p class="text-sm leading-relaxed">${escapeHtml(q.explanation||'')}</p>

      </div>

      </div>
    </article>`;
}

function distractorReason(q, letter) {
  // Lightweight rule-based hint. The book's explanation justifies the correct answer;
  // we surface a generic "incorrect because not the best answer per PMBOK" note.
  // Heuristic: if the explanation explicitly mentions the letter, surface that snippet.
  const expl = q.explanation || '';
  const re = new RegExp(`\\b${letter}\\b[^.]*\\.`, 'i');
  const m = expl.match(re);
  if (m) return m[0].trim();
  return `Not the best answer here — see the explanation; the correct choice (${q.correct}) better satisfies the PMBOK guidance for ${q.topic||'this topic'}.`;
}

/* ===========================================================
   ROUTE: REWORK (wrong-answer queue, shuffled)
   =========================================================== */
route('/rework', () => {
  // Build queue: all wrong qids not yet mastered, plus due-for-review from spaced repetition
  const wrongIds = new Set();
  for (const a of STATE.attempts) for (const r of a.responses) if (r.correct === false) wrongIds.add(r.qid);
  const now = Date.now();
  const queue = [];
  for (const id of wrongIds) {
    const m = STATE.mastery[id] || {};
    const mastered = (m.correct||0) >= 2 && (m.correct||0) > (m.wrong||0);
    if (!mastered) queue.push(id);
    else if (m.due && m.due <= now) queue.push(id); // spaced rep due
  }

  if (!queue.length) {
    mount(shell(html`
      <div class="text-center py-16">
        <div class="text-5xl mb-3">🎯</div>
        <h2 class="text-xl font-bold mb-2">Nothing to rework!</h2>
        <p class="text-slate-500">You've mastered every wrong answer. <a href="#/" class="text-brand-600">Take another test →</a></p>
      </div>`));
    return;
  }

  // Resolve qids to question objects (bank + custom-test questions)
  const idToQ = {};
  for (const q of BANK.all) idToQ[q._id] = q;
  const qs = shuffle(queue.map(id => idToQ[id]).filter(Boolean));

  // Run a lightweight quiz (no time limit, options shuffled, immediate feedback)
  const session = { idx:0, qs, results:[] };

  const renderRework = () => {
    const q = session.qs[session.idx];
    if (!q) {
      // done
      const correct = session.results.filter(r=>r.correct).length;
      mount(shell(html`

   =========================================================== */
function downloadFile(name, data, type='text/plain') {
  const blob = new Blob([data], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; document.body.appendChild(a); a.click();
  setTimeout(()=>{ a.remove(); URL.revokeObjectURL(url); }, 100);
}

function exportCSV(A, test) {
  const rows = [['#','Question','KA','Your answer','Correct answer','Result','Time (s)','Flagged']];
  for (let i=0;i<A.responses.length;i++) {
    const q = test.questions[i], r = A.responses[i];
    rows.push([
      i+1,
      (q.question||'').replace(/\s+/g,' ').slice(0,500),
      q.topic||'',
      r.choice||'',
      q.correct,
      r.correct===true?'correct':r.correct===false?'wrong':'unanswered',
      (r.timeMs/1000).toFixed(1),
      r.flagged?'yes':''
    ]);
  }
  const csv = rows.map(r=>r.map(v=>{
    const s = String(v??'');
    return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
  }).join(',')).join('\n');
  downloadFile(`${test.id.replace(/\s+/g,'_')}-${A.id}.csv`, csv, 'text/csv');
  toast('CSV downloaded','success');
}

/* ===========================================================
   STUDY-DAY HELPERS (used by hero streak/calendar)
   =========================================================== */
// Local-date key: 'YYYY-MM-DD' in the user's timezone. We deliberately do NOT
// use toISOString() here because it returns UTC, which mis-attributes activity
// to the wrong day for users east/west of UTC (e.g., Greece is UTC+2/+3).
function todayKey(date) {
  const d = date || new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
// Record activity for today. Called from Study Mode (on reveal) and Exam Mode
// (on finish). qs = questions answered to credit; mins = minutes elapsed.
function markStudyToday(qs, mins) {
  const key = todayKey();
  const e = STATE.studyDays[key] || { qs:0, mins:0 };
  e.qs += qs|0;
  e.mins += mins|0;
  STATE.studyDays[key] = e;
}
function computeStreak() {
  if (!Object.keys(STATE.studyDays).length) return 0;
  let streak = 0;
  let d = new Date(); d.setHours(0,0,0,0);
  for (let i=0;i<400;i++) {
    const key = todayKey(d);
    if (STATE.studyDays[key]) { streak++; d.setDate(d.getDate()-1); }
    else { if (i===0) { d.setDate(d.getDate()-1); continue; } break; }
  }
  return streak;
}
function computeExamsDone() {
  return (STATE.attempts||[]).filter(a => a.mode === 'exam').length;
}

    flags: Object.keys(STATE.flags).length,
    notes: Object.keys(STATE.qNotes).length + Object.keys(STATE.libNotes).length,
    bookmarks: Object.keys(STATE.bookmarks).length,
  };

  mount(shell(html`
    <div class="space-y-6 max-w-3xl">
      <div>
        <h1 class="text-2xl font-bold mb-1">Settings</h1>
        <p class="text-sm text-slate-500 dark:text-slate-400">Backup and reset your data.</p>
      </div>

      <div class="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-5">
        <h3 class="font-semibold mb-1">Local-only app</h3>
        <p class="text-sm text-slate-600 dark:text-slate-400">
          Progress is saved in this browser. To study on multiple devices,
          connect a free GitHub Gist below — or use Backup &amp; restore for
          one-off transfers.
        </p>
      </div>

      <div id="sync-card" class="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-5">
        <h3 class="font-semibold mb-1">Cloud sync (private GitHub Gist)</h3>
        <p class="text-sm text-slate-600 dark:text-slate-400 mb-3">
          Stores your progress in a <strong>private gist</strong> on your own GitHub account.
          Free, no card, no third-party server. Connect each device once with a Personal Access Token.
        </p>
        <details class="text-xs text-slate-600 dark:text-slate-400 mb-3">
          <summary class="cursor-pointer text-brand-600 dark:text-brand-400 font-medium">How to create a token (2 min)</summary>
          <ol class="list-decimal pl-5 mt-2 space-y-1 leading-relaxed">
            <li>Open <a class="underline" target="_blank" rel="noopener" href="https://github.com/settings/personal-access-tokens/new">github.com/settings/personal-access-tokens/new</a></li>
            <li>Token name: <code>PMP Prep sync</code> · Expiration: <code>1 year</code> (or longer)</li>
            <li>Resource owner: your account · Repository access: <code>Public Repositories (read-only)</code> is fine</li>
            <li>Permissions → Account permissions → <strong>Gists</strong> → <strong>Read and write</strong></li>
            <li>Generate, copy the token (starts with <code>github_pat_</code> or <code>ghp_</code>), paste below</li>
          </ol>
        </details>
        <div id="sync-status" class="text-xs mb-3"></div>
        <div id="sync-controls" class="space-y-2"></div>
      </div>

      <div class="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-5">
        <h3 class="font-semibold mb-1">Backup &amp; restore</h3>
        <p class="text-sm text-slate-600 dark:text-slate-400 mb-4">
          Manual JSON export/import. Useful for moving data between origins
          (e.g. <code class="text-xs">file://</code> → GitHub Pages) or for keeping an offline backup.
        </p>
        <dl class="grid grid-cols-2 sm:grid-cols-4 gap-3 text-sm mb-4">
          <div><dt class="text-xs text-slate-500">Attempts</dt><dd class="font-semibold">${counts.attempts}</dd></div>
          <div><dt class="text-xs text-slate-500">Flagged</dt><dd class="font-semibold">${counts.flags}</dd></div>
          <div><dt class="text-xs text-slate-500">Notes</dt><dd class="font-semibold">${counts.notes}</dd></div>
          <div><dt class="text-xs text-slate-500">Bookmarks</dt><dd class="font-semibold">${counts.bookmarks}</dd></div>
        </dl>
        <p class="text-xs text-slate-500 dark:text-slate-400 mb-3">Total size: <strong>${sizeKB} KB</strong> · Last modified: <strong>${lastModStr}</strong></p>
        <div class="flex flex-wrap items-center gap-2">
          <button id="settings-export" class="px-3 py-1.5 rounded-lg bg-brand-600 hover:bg-brand-700 text-white text-sm font-medium">Download JSON</button>
          <label class="px-3 py-1.5 rounded-lg border border-slate-300 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800 text-sm cursor-pointer">
            Restore from JSON…
            <input id="settings-import" type="file" accept="application/json,.json" class="hidden">
          </label>
          <button id="settings-copy" class="px-3 py-1.5 rounded-lg border border-slate-300 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">Copy JSON to clipboard</button>
          <button id="settings-paste" class="px-3 py-1.5 rounded-lg border border-slate-300 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">Paste JSON…</button>
        </div>
      </div>

      <div class="rounded-xl border border-rose-200 dark:border-rose-900/50 bg-rose-50/50 dark:bg-rose-950/20 p-5">
        <h3 class="font-semibold text-rose-900 dark:text-rose-200 mb-1">Danger zone</h3>
        <p class="text-sm text-rose-800 dark:text-rose-300 mb-3">
          Wipe all local data on this device. Cannot be undone.
        </p>
        <button id="settings-wipe" class="px-3 py-1.5 rounded-lg bg-rose-600 hover:bg-rose-700 text-white text-sm font-medium">Erase all data on this device</button>
      </div>
    </div>
  `));

  const applyImported = (parsed) => {
    if (!parsed || typeof parsed !== 'object' || !('attempts' in parsed)) throw new Error('Not a valid PMP Prep backup');
    STATE = Object.assign(Store._default(), parsed);
    STATE.lastModified = Date.now();
    Store.save(STATE);
    rebuildCatalog(); applyTheme();
    toast('Restored ' + (parsed.attempts?.length || 0) + ' attempts', 'success');
    render();
  };

  $('#settings-export').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(STATE, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const d = new Date(); const stamp = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}-${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}`;
    a.href = url; a.download = `pmp-prep-backup-${stamp}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  });
  $('#settings-import').addEventListener('change', async (ev) => {
    const f = ev.target.files?.[0]; if (!f) return;
    try {
      const text = await f.text();
      if (!confirm('Restore from "' + f.name + '"? This replaces all current data on this device.')) { ev.target.value = ''; return; }
      applyImported(JSON.parse(text));
    } catch (e) { toast('Import failed: ' + (e.message || e), 'error'); }
    ev.target.value = '';
  });
  $('#settings-copy').addEventListener('click', async () => {
    try { await navigator.clipboard.writeText(JSON.stringify(STATE)); toast('Copied to clipboard', 'success'); }
    catch (e) { toast('Clipboard blocked — try Download JSON instead', 'error'); }
  });
  $('#settings-paste').addEventListener('click', async () => {
    let text = '';
    try { text = await navigator.clipboard.readText(); } catch {}
    if (!text) text = prompt('Paste your backup JSON here:') || '';
    if (!text.trim()) return;
    try {
      if (!confirm('Replace all current data on this device with the pasted JSON?')) return;
      applyImported(JSON.parse(text));
    } catch (e) { toast('Paste failed: ' + (e.message || e), 'error'); }
  });
  $('#settings-wipe').addEventListener('click', async () => {
    if (!confirm('Erase ALL local data? This cannot be undone.')) return;
    if (!confirm('Are you absolutely sure? Type-check: this will delete all attempts, flags, notes, and custom tests.')) return;
    STATE = Store._default();
    STATE.lastModified = Date.now();
    Store.save(STATE);
    try { IDB.put(STATE); } catch {}
    // Also wipe the cloud gist if connected — otherwise the next merge would
    // restore everything from cloud and the wipe would feel like it failed.
    if (Sync.isConnected()) {
      try { await Sync.push({ lastModified: 0, placeholder: true }); }
      catch (e) { console.warn('Cloud wipe failed:', e.message); }
    }
    rebuildCatalog();
    toast('All data erased', 'warn');
    render();
  });

  // ---------- Cloud sync UI ----------
  const renderSync = () => {
    const status = $('#sync-status');
    const ctl = $('#sync-controls');
    if (!status || !ctl) return;
    if (Sync.isConnected()) {
      const last = Sync.getLastSync();
      const lastStr = last ? new Date(last).toLocaleString() : 'never';
      status.innerHTML = `<span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full bg-emerald-100 dark:bg-emerald-900/30 text-emerald-800 dark:text-emerald-300 font-medium">● Connected</span>
        <span class="text-slate-500 ml-2">Gist <code class="text-[10px]">${escapeHtml(Sync.getGistId())}</code> · last sync ${lastStr}</span>`;
      ctl.innerHTML = `
        <div class="flex flex-wrap gap-2">
          <button id="sync-pull" class="px-3 py-1.5 rounded-lg border border-slate-300 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">⬇ Pull now</button>
          <button id="sync-push" class="px-3 py-1.5 rounded-lg border border-slate-300 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">⬆ Push now</button>
          <button id="sync-disconnect" class="px-3 py-1.5 rounded-lg border border-rose-300 dark:border-rose-800 text-rose-700 dark:text-rose-300 hover:bg-rose-50 dark:hover:bg-rose-950/30 text-sm">Disconnect</button>
        </div>`;
      $('#sync-pull').onclick = async () => {
        try {
          const remote = await Sync.pull();
          if (!remote || remote.placeholder) { toast('Cloud is empty', 'warn'); return; }
          const before = STATE.attempts.length;
          STATE = mergeStates(STATE, remote);
          STATE.lastModified = Date.now();
          Store.save(STATE);
          try { IDB.put(STATE); } catch {}
          await Sync.push(STATE);
          rebuildCatalog(); applyTheme();
          const gained = STATE.attempts.length - before;
          toast(gained > 0 ? ('Merged — ' + gained + ' new attempt' + (gained>1?'s':'') + ' from cloud') : 'Already in sync', 'success');
          render();
        } catch (e) { toast('Pull failed: ' + e.message, 'error'); }
      };
      $('#sync-push').onclick = async () => {
        try { await Sync.push(STATE); toast('Pushed to cloud', 'success'); renderSync(); }
        catch (e) { toast('Push failed: ' + e.message, 'error'); }
      };
      $('#sync-disconnect').onclick = () => {
        if (!confirm('Disconnect this device? Cloud gist is kept; your other devices keep syncing.')) return;
        Sync.disconnect(); toast('Disconnected', 'warn'); renderSync();
      };
    } else {
      status.innerHTML = `<span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-medium">○ Not connected</span>`;
      ctl.innerHTML = `
        <div class="flex flex-col sm:flex-row gap-2">
          <input id="sync-token" type="password" autocomplete="off" placeholder="github_pat_…" class="flex-1 px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-sm font-mono"/>
          <button id="sync-connect" class="px-4 py-2 rounded-lg bg-brand-600 hover:bg-brand-700 text-white text-sm font-semibold">Connect</button>
        </div>`;
      $('#sync-connect').onclick = async () => {
        const tok = $('#sync-token').value.trim();
        if (!tok) { toast('Paste your token first', 'warn'); return; }
        const btn = $('#sync-connect');
        btn.disabled = true; btn.textContent = 'Connecting…';
        try {
          await Sync.connect(tok);
          // Auto-merge: pull cloud, union with local, push merged result.
          // No prompts — like a Google account. Neither side loses data.
          await syncPullOnBoot();
          toast('Connected — merged with cloud', 'success');
          renderSync();
        } catch (e) {
          toast('Connect failed: ' + e.message, 'error');
          btn.disabled = false; btn.textContent = 'Connect';
        }
      };
    }
  };
  renderSync();
});

function browseQuestions(initial) {
  // gather KAs
  const kaCounts = {};
  for (const q of BANK.all) { const k = q.topic || 'Unknown'; kaCounts[k] = (kaCounts[k]||0) + 1; }
  const kas = Object.keys(kaCounts).sort();

  let qstr = '';
  let ka = 'all';
  let flaggedOnly = !!initial.flaggedOnly;
  let limit = 50;

  const title = flaggedOnly ? 'Flagged questions' : 'Browse questions';
  mount(shell(html`
    <h1 class="text-2xl font-bold mb-2">${title}</h1>
    <p class="text-sm text-slate-500 mb-4">${BANK.all.length} questions in the bank. Filter by KA, search text, or limit to flagged only.</p>
    <div class="grid grid-cols-1 sm:grid-cols-[1fr_auto_auto] gap-2 mb-4">
      <input id="q-search" type="search" autofocus placeholder="Search question, options, explanation…" class="px-4 py-2.5 rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900" />
      <select id="ka-filter" class="px-3 py-2.5 rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-sm">
        <option value="all">All KAs (${BANK.all.length})</option>
        ${kas.map(k => `<option value="${escapeHtml(k)}">${escapeHtml(k)} (${kaCounts[k]})</option>`).join('')}
      </select>
      <label class="inline-flex items-center gap-2 px-3 py-2.5 rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-sm cursor-pointer">
        <input id="flag-only" type="checkbox" ${flaggedOnly?'checked':''} class="accent-brand-600"/>
        <span>⚑ Flagged only</span>
      </label>
    </div>
    <div id="q-results"></div>
  `));

  const inp = $('#q-search');
  const sel = $('#ka-filter');
  const flagChk = $('#flag-only');
  const out = $('#q-results');

  const render = () => {
    const re = qstr.length >= 2 ? new RegExp(qstr.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'i') : null;
    const hits = [];
    for (const q of BANK.all) {
      if (ka !== 'all' && (q.topic||'Unknown') !== ka) continue;
      if (flaggedOnly && !STATE.flags[q._id]) continue;
      if (re) {
        const hay = q.question + ' ' + Object.values(q.options||{}).join(' ') + ' ' + (q.explanation||'');
        if (!re.test(hay)) continue;
      }
      hits.push(q);
    }
    if (!hits.length) { out.innerHTML = `<p class="text-slate-500 py-8 text-center">No questions match.</p>`; return; }
    const shown = hits.slice(0, limit);
    const moreBtn = hits.length > limit ? `<div class="mt-4 text-center"><button id="show-more" class="px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-800 hover:bg-slate-100 dark:hover:bg-slate-800 text-sm">Show more (${hits.length - limit} remaining)</button></div>` : '';
    out.innerHTML = `<p class="text-sm text-slate-500 mb-3">${hits.length} question${hits.length>1?'s':''} ${qstr?'matching':''} · showing ${shown.length}</p>` +
      shown.map(q => {
        const isFlagged = !!STATE.flags[q._id];
        const m = STATE.mastery[q._id];
        const masteryBadge = m ? (m.correct >= 2 && m.correct > m.wrong
          ? '<span class="text-[10px] px-1.5 py-0.5 rounded bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300">Mastered</span>'
          : m.wrong > 0 ? `<span class="text-[10px] px-1.5 py-0.5 rounded bg-rose-100 text-rose-700 dark:bg-rose-900/40 dark:text-rose-300">${m.correct}✓ ${m.wrong}✗</span>`
          : `<span class="text-[10px] px-1.5 py-0.5 rounded bg-slate-100 dark:bg-slate-800 text-slate-600">Seen</span>`) : '';
        let snip = q.question.slice(0, 240);
        if (re) {
          const idx = q.question.toLowerCase().indexOf(qstr.toLowerCase());
          if (idx >= 0) snip = q.question.slice(Math.max(0,idx-50), idx+qstr.length+150);
        }
        let snipHtml = escapeHtml(snip);
        if (re) snipHtml = snipHtml.replace(new RegExp('('+qstr.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark class="bg-amber-200 dark:bg-amber-700/60">$1</mark>');
        return `<div class="rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-3 mb-2">
          <div class="flex items-center gap-2 flex-wrap text-xs">
            <span class="text-brand-600 dark:text-brand-400 font-semibold">${escapeHtml(q.section)} · #${q.num}</span>
            <span class="px-1.5 py-0.5 rounded bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300">${escapeHtml(q.topic||'')}</span>
            ${isFlagged ? '<span class="px-1.5 py-0.5 rounded bg-amber-100 text-amber-800 dark:bg-amber-900/40 dark:text-amber-300">⚑ Flagged</span>' : ''}
            ${masteryBadge}
          </div>
          <div class="text-sm mt-1.5 leading-relaxed">${snipHtml}${q.question.length>snip.length?'…':''}</div>
          <div class="text-xs mt-1.5"><a class="text-brand-600 hover:underline" href="#/test/${encodeURIComponent(q.section)}">Open this test →</a></div>
        </div>`;
      }).join('') + moreBtn;
    const sm = $('#show-more'); if (sm) sm.onclick = () => { limit += 50; render(); };
  };

  const trigger = debounce(() => { limit = 50; render(); }, 200);
  inp.addEventListener('input', e => { qstr = e.target.value.trim(); trigger(); });
  sel.addEventListener('change', e => { ka = e.target.value; limit = 50; render(); });
  flagChk.addEventListener('change', e => { flaggedOnly = e.target.checked; limit = 50; render(); });
  render();
}

/* ===========================================================
   KEYBOARD SHORTCUT HELP OVERLAY (?)
   =========================================================== */
window.addEventListener('keydown', (e) => {
  if (e.key === '?' && !/INPUT|TEXTAREA|SELECT/.test(document.activeElement?.tagName||'')) {
    e.preventDefault();
    const existing = document.getElementById('kb-help');
    if (existing) { existing.remove(); return; }
    const o = document.createElement('div');
    o.id = 'kb-help';
    o.className = 'fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-4';
    o.innerHTML = `
      <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl max-w-md w-full p-6">
        <h3 class="text-lg font-bold mb-4">Keyboard shortcuts</h3>
        <table class="w-full text-sm">
          <tbody class="divide-y divide-slate-200 dark:divide-slate-800">
            <tr><td class="py-2"><kbd class="px-2 py-0.5 bg-slate-100 dark:bg-slate-800 rounded text-xs">1-4</kbd></td><td>Select option A-D</td></tr>
            <tr><td class="py-2"><kbd class="px-2 py-0.5 bg-slate-100 dark:bg-slate-800 rounded text-xs">←/→</kbd></td><td>Previous / Next question</td></tr>
            <tr><td class="py-2"><kbd class="px-2 py-0.5 bg-slate-100 dark:bg-slate-800 rounded text-xs">F</kbd></td><td>Flag question</td></tr>
            <tr><td class="py-2"><kbd class="px-2 py-0.5 bg-slate-100 dark:bg-slate-800 rounded text-xs">Enter</kbd></td><td>Next question</td></tr>
            <tr><td class="py-2"><kbd class="px-2 py-0.5 bg-slate-100 dark:bg-slate-800 rounded text-xs">?</kbd></td><td>Show / hide this help</td></tr>
          </tbody>
        </table>
        <button id="kb-close" class="mt-5 w-full px-4 py-2 rounded-lg bg-brand-600 text-white font-semibold">Close</button>
      </div>`;
    document.body.appendChild(o);
    o.onclick = (ev) => { if (ev.target === o || ev.target.id === 'kb-close') o.remove(); };
  }
});


</script>
